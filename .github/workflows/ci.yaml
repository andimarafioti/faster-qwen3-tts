name: CI/CD

on:
  pull_request:
    branches: [ develop ]
    types: [ opened, synchronize, reopened, closed ]
    paths-ignore:
      - 'helm/**'
      # - '.github/workflows/**'  # Restore before merge
      - 'taskfile.yaml'

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      prebuilt_tag: ${{ steps.meta.outputs.prebuilt_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set prebuilt tag
        id: meta
        run: |
          echo "prebuilt_tag=ghcr.io/qarlai/dockerimgstaging/faster-qwen3-tts:prebuilt-${{ github.event.pull_request.head.sha || github.sha }}" >> $GITHUB_OUTPUT

      - name: Authenticate Docker to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.prebuilt_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  call-sync-library:
    needs: build-image
    uses: QarlAI/.github/.github/workflows/build-push-sync.yaml@mavis/GAR-to-GHCR
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      target_branch: develop
      image_name: faster-qwen3-tts
      prebuilt_tag: ${{ needs.build-image.outputs.prebuilt_tag }}
      yaml_key: .faster-qwen3-tts
      images_yaml_paths: |
        helm/qarl-live/images.yaml
      environment: develop
    secrets: inherit
