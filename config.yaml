# Faster Qwen3 TTS API Configuration

model:
  name: "Qwen/Qwen3-TTS-12Hz-1.7B-Base"
  device: "cuda:0"
  dtype: "bfloat16"
  attn_implementation: "sdpa"

voices:
  dir: "/app/voices"
  gcs:
    bucket: "qarl-studio-bucket"   # GCS bucket name (leave empty to disable)
    prefix: "voices"   # Prefix/path within the bucket

streaming:
  chunk_size: 8  # Number of codec frames per chunk (16 frames ≈ 1333ms of audio)
