---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: faster-qwen3-tts
spec:
  strategy:
    type: Recreate
  {{- if .Values.progressDeadlineSeconds }}
  progressDeadlineSeconds: {{ .Values.progressDeadlineSeconds }}
  {{- end }}
  {{- if .Values.replicas }}
  replicas: {{ .Values.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: faster-qwen3-tts
  template:
    metadata:
      labels:
        app: faster-qwen3-tts
    spec:
      {{- if .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Image pull secrets for Google Artifact Registry
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Init containers
      initContainers:
      - name: wait-for-dns
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            for i in $(seq 1 60); do
              if nslookup oauth2.googleapis.com >/dev/null 2>&1; then
                echo "DNS ready after ${i}s"; exit 0
              fi
              sleep 1
            done
            echo "DNS still unresolved after 60s" >&2; exit 1

      # GPU verification
      - name: gpu-check
        image: nvidia/cuda:12.4.1-base-ubuntu22.04
        command:
          - /bin/bash
          - -c
          - "nvidia-smi && echo 'GPU verification successful'"
        env:
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: {{ .Values.envVars.NVIDIA_DRIVER_CAPABILITIES | quote }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}

      # Main faster-qwen3-tts container
      containers:
      - name: faster-qwen3-tts
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - containerPort: 8000
          name: http

        # Environment variables
        env:
        # Pod IP for self-registration with Valkey (allocator hands this out).
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        {{- if .Values.valkey.url }}
        - name: VALKEY_URL
          value: {{ .Values.valkey.url | quote }}
        {{- end }}
        - name: MODEL_NAME
          value: {{ .Values.model.name | quote }}
        - name: DTYPE
          value: {{ .Values.model.dtype | quote }}
        - name: ATTN_IMPLEMENTATION
          value: {{ .Values.model.attnImplementation | quote }}
        - name: CHUNK_SIZE
          value: {{ .Values.model.chunkSize | quote }}
        {{- if .Values.hfToken.secretName }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.hfToken.secretName }}
              key: {{ .Values.hfToken.secretKey | default "HF_TOKEN" }}
        {{- end }}
        {{- if .Values.gcs.voiceCacheBucket }}
        - name: VOICE_CACHE_BUCKET
          value: {{ .Values.gcs.voiceCacheBucket | quote }}
        - name: VOICE_CACHE_PREFIX
          value: {{ .Values.gcs.voiceCachePrefix | quote }}
        {{- end }}
        {{- range $name, $value := .Values.envVars }}
        - name: {{ $name }}
          value: {{ $value | quote }}
        {{- end }}

        # Resource limits
        resources:
          {{- toYaml .Values.resources | nindent 10 }}

        # Block graceful termination until any in-flight TTS job has finished.
        # `mark_busy` writes /tmp/busy at ws accept, `mark_idle` deletes it
        # at ws close. Mirrors the renderer pattern in model-benchmarking.
        lifecycle:
          preStop:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  while [ -f /tmp/busy ]; do
                    sleep 1
                  done

        # Health check probes
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: {{ .Values.healthCheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthCheck.periodSeconds }}
          timeoutSeconds: {{ .Values.healthCheck.timeoutSeconds }}
          failureThreshold: {{ .Values.healthCheck.failureThreshold }}

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: {{ .Values.healthCheck.readinessInitialDelaySeconds | default 120 }}
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Volume mounts
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: models
          mountPath: /root/.cache/huggingface
        {{- with .Values.extraVolumeMounts }}
          {{- toYaml . | nindent 8 }}
        {{- end }}

      # Volumes
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: {{ .Values.shmSize }}
      - name: models
        ephemeral:
          volumeClaimTemplate:
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: {{ .Values.storage.storageClassName }}
              resources:
                requests:
                  storage: {{ .Values.storage.size }}
      {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 6 }}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: qwen3
spec:
  type: {{ .Values.service.type }}
  selector:
    app: faster-qwen3-tts
  ports:
  - name: http
    port: {{ .Values.service.port }}
    targetPort: 8000
    {{- if eq .Values.service.type "NodePort" }}
    nodePort: {{ .Values.service.nodePort }}
    {{- end }}
