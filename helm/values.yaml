# values.yaml - Faster Qwen3 TTS Configuration

image:
  repository: us-docker.pkg.dev/qarlproductionregistries/dockerimg/faster-qwen3-tts
  tag: "1.0.9"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: gar-docker-reg-secret

# Number of TTS pods. Each pod requests one GPU, so the node-group=tts node(s)
# must collectively expose at least this many `nvidia.com/gpu` resources.
replicas: 1

# Service configuration. Use ClusterIP — pipeline traffic is now routed
# per-pod by the qarl-backend-api allocator, and voice validation hits the
# service VIP for in-cluster load balancing across all pods.
service:
  type: ClusterIP
  port: 8000

# GPU resources (0 = bypass K8s GPU scheduling, use NVIDIA runtime directly)
resources:
  limits:
    nvidia.com/gpu: 0
  requests:
    nvidia.com/gpu: 0

# Model configuration
model:
  # HuggingFace model name
  name: "Qwen/Qwen3-TTS-12Hz-1.7B-Base"

  # Streaming parameters
  # chunk_size: Number of codec frames per chunk (8 frames ≈ 667ms of audio)
  chunkSize: 8

  # Device configuration
  dtype: "bfloat16"
  attnImplementation: "sdpa"

# Environment variables
envVars:
  NVIDIA_DRIVER_CAPABILITIES: "compute,utility"

# Valkey URL for pod registration. When set, each pod registers itself in the
# `tts:idle` / `tts:all` Valkey sets so the qarl-backend-api allocator can
# hand out one TTS pod per pipeqarl job. Leave empty to disable registration
# (e.g. for local dev or non-cluster runs).
valkey:
  url: ""

# Health check configuration
healthCheck:
  initialDelaySeconds: 30  # 30 seconds to allow container to start
  readinessInitialDelaySeconds: 60  # 60 seconds
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 30  # 30 * 30s = 15 min max wait for first cold start

# Shared memory size (for PyTorch operations)
shmSize: "4Gi"

# Per-pod ephemeral PVC for the HuggingFace model cache. Each replica gets
# its own dynamically-provisioned volume tied to its lifecycle, so the
# deployment scales horizontally without volume node-affinity conflicts.
# Mirrors the pattern used by ditto (model-benchmarking).
storage:
  size: 20Gi
  storageClassName: mdx-local-path

# HuggingFace token configuration
hfToken:
  # Secret name containing the HF token (leave empty to disable)
  secretName: ""
  # Key within the secret (defaults to "HF_TOKEN" if not specified)
  secretKey: "HF_TOKEN"

# Extra volumes and volume mounts (e.g., for GCP SA key)
extraVolumes: []
extraVolumeMounts: []

# GCS voice cache configuration
gcs:
  voiceCacheBucket: ""
  voiceCachePrefix: ""

# Deployment progress deadline (in seconds)
# This is how long Kubernetes will wait for the deployment to make progress before marking it as failed
progressDeadlineSeconds: 600

# Time K8s waits for graceful shutdown. Mirrors the renderer pattern: the
# preStop hook polls for /tmp/busy removal, so this needs to be long enough
# for an in-flight TTS job to finish.
terminationGracePeriodSeconds: 600
